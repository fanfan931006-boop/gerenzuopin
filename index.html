    // 密码验证组件
    const PasswordProtection = ({ onPasswordCorrect }) => {
      const [password, setPassword] = React.useState('');
      const [error, setError] = React.useState('');
      const [isLoading, setIsLoading] = React.useState(false);

      // 获取当天日期，格式为月.日（如3.28）
      const getTodayDate = () => {
        const today = new Date();
        const month = today.getMonth() + 1;
        const day = today.getDate();
        return `${month}.${day}`;
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        setIsLoading(true);
        setError('');

        // 模拟验证延迟
        setTimeout(() => {
          if (password === getTodayDate()) {
            onPasswordCorrect();
          } else {
            setError('密码错误，请联系管理员获取正确密码');
          }
          setIsLoading(false);
        }, 500);
      };

      return (
        <div className="fixed inset-0 bg-gradient-to-br from-primary to-secondary flex items-center justify-center p-4 z-50">
          <div className="w-full max-w-md bg-white rounded-xl shadow-2xl p-8">

                <i className="fa fa-lock text-white text-2xl"></i>
              </div>
              <h1 className="text-2xl font-bold text-neutral-800 mb-2">访问密码</h1>
              <p className="text-neutral-600">请输入访问密码</p>
            </div>
            {error && (
              <div className="mb-4 p-3 bg-red-50 text-red-600 rounded-md text-sm">
                {error}
              </div>
            )}
            <form onSubmit={handleSubmit} className="space-y-6">

                <label className="block text-sm font-medium text-neutral-700 mb-2">密码</label>
                <input
                  type="text"
                  className="w-full p-3 border border-neutral-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary input-focus"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  placeholder="欢迎访问范瑞明的个人作品网站"

                  </div>
                ) : (
                  '验证密码'
                )}

            </form>

    const useInViewAnimation = (options = {}) => {
      const ref = React.useRef(null);
      const [isInView, setIsInView] = React.useState(false);

      React.useEffect(() => {
        const observer = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) {
            setIsInView(true);
            observer.unobserve(entry.target);
          }
        }, {
          threshold: 0.1,
          rootMargin: '-50px 0px',
          ...options
        });

        if (ref.current) {
          observer.observe(ref.current);
        }

        return () => {
          if (ref.current) {
            observer.unobserve(ref.current);
          }
        };
      }, [options]);

      return [ref, isInView];
    };

    // 色彩处理工具函数
    const sortWorksByHue = (works) => {

    // 从图片生成颜色的函数
    const generateColorsFromImage = (imageUrl) => {
      const img = new Image();
      img.crossOrigin = 'Anonymous';
      img.onload = function() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);

        try {
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = imageData.data;
          const colorCounts = {};

          // 采样像素
          for (let i = 0; i < data.length; i += 4 * 10) { // 每10个像素采样一次
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];
            const a = data[i + 3];

            if (a > 128) { // 忽略透明度高的像素
              const hex = rgbToHex(r, g, b);
              colorCounts[hex] = (colorCounts[hex] || 0) + 1;
            }
          }

          // 找出最常见的颜色
          const sortedColors = Object.entries(colorCounts)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 5);

          if (sortedColors.length > 0) {
            const dominantColor = sortedColors[0][0];
            // 设置主色调输入框
            const colorInput = document.querySelector('input[type="color"]');
            const colorTextInput = document.querySelector('input[placeholder="请输入主色调"]');
            if (colorInput) colorInput.value = dominantColor;
            if (colorTextInput) colorTextInput.value = dominantColor;
          }
        } catch (error) {
          console.error('Error generating colors:', error);
        }
      };
      img.src = imageUrl;
    };

    // RGB转十六进制颜色
    const rgbToHex = (r, g, b) => {
      return '#' + [r, g, b].map(x => {

        return hex.length === 1 ? '0' + hex : hex;
      }).join('');

                                  const workId = state.selectedWorkId;
                                  const newImages = [];
                                  let completedFiles = 0;
                                  
                                  // 先读取所有文件，然后一次性更新状态，提高性能
                                  const readFilePromises = Array.from(files).map(file => {
                                    return new Promise((resolve) => {
                                      const reader = new FileReader();
                                      reader.onload = function(e) {
                                        const imageUrl = e.target.result;
                                        newImages.push(imageUrl);
                                        // 自动生成颜色（只使用第一张图片生成颜色）
                                        if (newImages.length === 1) {
                                          generateColorsFromImage(imageUrl);
                                        }
                                        
                                        // 更新进度条
                                        completedFiles++;
                                        const progress = Math.round((completedFiles / files.length) * 100);
                                        progressBar.style.width = `${progress}%`;
                                        progressText.textContent = `上传中... ${completedFiles}/${files.length}`;
                                        
                                        resolve(imageUrl);
                                      };
                                      reader.readAsDataURL(file);
                                    });
                                  });
                                  
                                  // 所有文件读取完成后更新状态
                                  Promise.all(readFilePromises).then(() => {
                                    // 隐藏进度条
                                    progressContainer.classList.add('hidden');
                                    
                                    if (workId) {
                                      // 编辑作品：更新works数组
                                      const updatedWorks = state.works.map(w => {
                                        if (w.id === workId) {
                                          return {
                                            ...w,
                                            images: [...w.images, ...newImages]
                                          };
                                        }
                                        return w;
                                      });
                                      updateState({ works: updatedWorks });
                                    } else {
                                      // 新增作品：更新临时存储
                                      updateState(prev => ({
                                        tempWorkImages: [...(prev.tempWorkImages || []), ...newImages]
                                      }));
                                    }
                                  });
                                }
                              }}
                            />
                            <label 
                              htmlFor="imageUpload"
                              className="mt-4 inline-block px-4 py-2 bg-primary text-white rounded-md hover:bg-primary/90 transition-colors cursor-pointer"
                            >
                              <i className="fa fa-folder-open mr-1"></i>
                              选择文件
                            </label>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* 分类编辑页面 */}
              {(state.step === AppStep.ADMIN_CATEGORY_ADD || state.step === AppStep.ADMIN_CATEGORY_EDIT) && (
                <div className="space-y-6">
                  <div className="flex justify-between items-center">
                    <h3 className="text-lg font-semibold text-gray-800">
                      {state.step === AppStep.ADMIN_CATEGORY_ADD ? '新增分类' : '编辑分类'}
                    </h3>
                    <div className="space-x-2">
                      <button 
                        onClick={handleCategoryManageClick}
                        className="px-4 py-2 bg-gray-200 text-gray-700 rounded-md hover:bg-gray-300 transition-colors"
                      >
                        <i className="fa fa-arrow-left mr-1"></i>
                        返回列表
                      </button>
                      <button 
                        className="px-4 py-2 bg-primary text-white rounded-md hover:bg-primary/90 transition-colors"
                        onClick={() => {
                          // 获取表单数据
                          const name = document.querySelector('input[placeholder="请输入分类名称"]').value;
                          const order = parseInt(document.querySelector('input[placeholder="请输入排序"]').value);
                          
                          // 验证表单
                          if (!name || !order) {
                            alert('请填写所有必填字段');
                            return;
                          }
                          
                          if (state.step === AppStep.ADMIN_CATEGORY_ADD) {
                            // 新增分类
                            const newCategory = {
                              id: Date.now().toString(),
                              name,
                              order,
                              createdAt: new Date().toISOString(),
                              updatedAt: new Date().toISOString()
                            };
                            
                            const updatedCategories = [...state.categories, newCategory];
                            updateState({ categories: updatedCategories, step: AppStep.ADMIN_CATEGORY_MANAGE });
                          } else if (state.step === AppStep.ADMIN_CATEGORY_EDIT) {
                            // 编辑分类
                            const updatedCategories = state.categories.map(category => {
                              if (category.id === state.selectedCategoryId) {
                                return {
                                  ...category,
                                  name,
                                  order,
                                  updatedAt: new Date().toISOString()
                                };
                              }
                              return category;
                            });
                            
                            updateState({ categories: updatedCategories, step: AppStep.ADMIN_CATEGORY_MANAGE });
                          }
                        }}
                      >
                        <i className="fa fa-save mr-1"></i>
                        保存分类
                      </button>
                    </div>
                  </div>
                  <div className="bg-white rounded-lg shadow-md p-6">
                    <div className="max-w-md">
                      <div className="space-y-4">
                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-2">分类名称 *</label>
                          <input
                            type="text"
                            className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary"
                            defaultValue={state.selectedCategoryId ? state.categories.find(c => c.id === state.selectedCategoryId)?.name : ''}
                            placeholder="请输入分类名称"
                          />
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-2">排序 *</label>
                          <input
                            type="number"
                            className="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary"
                            defaultValue={state.selectedCategoryId ? state.categories.find(c => c.id === state.selectedCategoryId)?.order : state.categories.length + 1}
                            placeholder="请输入排序"
                          />
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </main>
          </div>
        </div>
      );
    };

    // 主应用组件
    const MainApp = () => {
      const [state, setState] = React.useState(initialState);

      const updateState = (updater) => {
        setState(prev => ({
          ...prev,
          ...updater
        }));
      };

      const handlePasswordCorrect = () => {
        updateState({ isPasswordVerified: true });
      };

      const handleWorkClick = (workId) => {
        // 增加浏览次数
        const updatedWorks = state.works.map(work => 
          work.id === workId ? { ...work, viewCount: work.viewCount + 1 } : work
        );
        const updatedVisitStats = {
          ...state.visitStats,
          workVisits: {
            ...state.visitStats.workVisits,
            [workId]: (state.visitStats.workVisits[workId] || 0) + 1
          }
        };
        updateState({
          works: updatedWorks,
          visitStats: updatedVisitStats,
          selectedWorkId: workId,
          step: AppStep.WORK_DETAIL
        });
      };

      // 根据当前步骤渲染不同页面
      const renderPage = () => {
        switch (state.step) {
          case AppStep.WORK_DETAIL:
            return <WorkDetailPage state={state} updateState={updateState} />;
          case AppStep.ABOUT:
            return <AboutPage state={state} updateState={updateState} />;
          case AppStep.ADMIN_LOGIN:
            return <AdminLoginPage state={state} updateState={updateState} />;
          case AppStep.ADMIN_DASHBOARD:
          case AppStep.ADMIN_WORK_MANAGE:
          case AppStep.ADMIN_CATEGORY_MANAGE:
          case AppStep.ADMIN_WORK_ADD:
          case AppStep.ADMIN_WORK_EDIT:
          case AppStep.ADMIN_CATEGORY_ADD:
          case AppStep.ADMIN_CATEGORY_EDIT:
          case AppStep.ADMIN_ABOUT_MANAGE:
            return <AdminNavigation state={state} updateState={updateState} />;
          case AppStep.HOME:
          default:
            const filteredWorks = state.selectedCategoryId 
              ? state.works.filter(work => work.category === state.selectedCategoryId)
              : state.works;
            return (
              <div className="min-h-screen bg-light">
                <Navigation state={state} updateState={updateState} />
                <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                  {/* 关于我信息展示 */}
                  <div className="bg-white rounded-2xl shadow-medium overflow-hidden animate-fade-in-up mb-12">
                    <div className="grid md:grid-cols-2 gap-8 p-8 lg:p-12">
                      <div>
                        <div className="aspect-square overflow-hidden rounded-2xl mb-6 border-4 border-neutral-100 shadow-md w-48 mx-auto md:mx-0">
                          <img
                            src={state.aboutMe.avatar}
                            alt="个人头像"
                            className="w-full h-full object-cover transition-transform duration-700 hover:scale-105"
                          />
                        </div>
                        <div className="space-y-4 text-center md:text-left">
                          <h2 className="text-2xl font-bold text-gray-800">{state.aboutMe.name}</h2>
                          <p className="text-xl text-primary font-medium">{state.aboutMe.title}</p>
                          <p className="text-gray-600 mt-4">{state.aboutMe.bio.split('\n\n')[0]}</p>
                          <div className="flex flex-wrap justify-center md:justify-start gap-3 mt-6">
                            <button
                              onClick={() => updateState({ step: AppStep.ABOUT })}
                              className="px-5 py-2.5 bg-gradient-primary text-white rounded-lg hover:shadow-lg transition-all btn-primary"
                            >
                              了解更多
                            </button>
                          </div>
                        </div>
                      </div>
                      <div>
                        <h3 className="text-xl font-semibold text-gray-800 mb-6">个人统计</h3>
                        <div className="grid grid-cols-2 gap-4">
                          <div className="bg-gradient-primary text-white rounded-xl p-5 text-center card-hover">
                            <p className="text-3xl font-bold mb-1">{state.aboutMe.stats.totalProjects}</p>
                            <p className="text-white/90">总项目数</p>
                          </div>
                          <div className="bg-gradient-secondary text-white rounded-xl p-5 text-center card-hover">
                            <p className="text-3xl font-bold mb-1">{state.aboutMe.stats.happyClients}</p>
                            <p className="text-white/90">满意客户</p>
                          </div>
                          <div className="bg-gradient-primary text-white rounded-xl p-5 text-center card-hover">
                            <p className="text-3xl font-bold mb-1">{state.aboutMe.stats.experienceYears}</p>
                            <p className="text-white/90">从业年限</p>
                          </div>
                          <div className="bg-gradient-secondary text-white rounded-xl p-5 text-center card-hover">
                            <p className="text-3xl font-bold mb-1">{state.aboutMe.stats.awards}</p>
                            <p className="text-white/90">获奖次数</p>
                          </div>
                        </div>
                        <div className="mt-8">
                          <h3 className="text-xl font-semibold text-gray-800 mb-4">专业技能</h3>
                          <div className="space-y-3">
                            {state.aboutMe.skills.slice(0, 4).map(skill => (
                              <div key={skill.id}>
                                <div className="flex justify-between mb-1">
                                  <span className="text-sm font-medium text-gray-700">{skill.name}</span>
                                  <span className="text-sm text-gray-500">{skill.level}%</span>
                                </div>
                                <div className="w-full bg-neutral-200 rounded-full h-2.5 overflow-hidden">
                                  <div 
                                    className="bg-gradient-primary h-full rounded-full transition-all duration-1000 ease-out" 
                                    style={{ width: `${skill.level}%` }}
                                  ></div>
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                  
                  {/* 作品列表 */}
                  <div className="mb-8">
                    <h1 className="text-3xl font-bold text-gray-800 mb-2">
                      {state.selectedCategoryId 
                        ? state.categories.find(c => c.id === state.selectedCategoryId)?.name 
                        : '全部作品'
                      }
                    </h1>
                    <p className="text-gray-600">
                      共 {filteredWorks.length} 个作品
                    </p>
                  </div>
                  <WaterfallGrid works={filteredWorks} onWorkClick={handleWorkClick} />
                </main>
                <footer className="bg-white border-t border-gray-200 mt-12">
                  <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                    <div className="flex flex-col md:flex-row justify-between items-center">
                      <div className="mb-4 md:mb-0">
                        <p className="text-gray-600">© 2024 个人作品集. 保留所有权利.</p>
                      </div>
                      <div className="flex items-center space-x-4">
                        <span className="text-gray-600 flex items-center">
                          <i className="fa fa-eye mr-1"></i>
                          总访问量: {state.visitStats.totalVisits}
                        </span>
                      </div>
                    </div>
                  </div>
                </footer>
              </div>
            );
        }
      };

      return (
        <div className="min-h-screen">
          {!state.isPasswordVerified && <PasswordProtection onPasswordCorrect={handlePasswordCorrect} />}
          {state.isPasswordVerified && renderPage()}
        </div>
      );
    };

    // 渲染应用
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <div className="transition-all duration-300 ease-in-out">
        <MainApp />
      </div>
    );
  </script>
</body>
</html>
